<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World JavaScript Demo</title>
</head>
<body>

    <h1>JavaScript Output Methods</h1>
    <p>Check the browser console (F12) and the alert popup to see the results.</p>

    <script>
        /**
         * 1. console.log()
         * Outputs to the developer tools console.
         */
        console.log("Hello\nWorld");

        /**
         * 2. document.write()
         * Writes directly into the HTML stream. 
         * Note: \n creates a newline in source code, but browsers require <br> 
         * for a visual line break in the document body.
         */
        document.write("Hello<br>World");

        /**
         * 3. alert()
         * Displays an alert box with the message.
         */
        alert("Hello\nWorld");
    </script>

</body>
</html>
